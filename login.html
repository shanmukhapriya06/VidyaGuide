<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - VidyaGuide AI</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>

<body class="bg-light">
    <!-- Navigation Guard (Checks if already logged in) -->
    <script src="js/guard.js"></script>

    <div class="container">
        <div class="row min-vh-100 align-items-center justify-content-center">
            <div class="col-md-5">
                <div class="card p-4 shadow-sm border-0 rounded-4">
                    <!-- Toggleable Sections -->
                    <div id="login-section">
                        <div class="text-center mb-4">
                            <h2 class="fw-bold text-primary">VidyaGuide AI</h2>
                            <p class="text-muted">Welcome back! Please login to continue.</p>
                        </div>
                        <form id="login-form">
                            <div class="mb-3">
                                <label class="form-label fw-bold">Email or Mobile</label>
                                <input type="text" class="form-control p-3 bg-light border-0 shadow-none"
                                    placeholder="Enter your email or mobile" required>
                            </div>
                            <div class="mb-3">
                                <label class="form-label fw-bold">Password</label>
                                <input type="password" class="form-control p-3 bg-light border-0 shadow-none"
                                    placeholder="••••••••" required>
                            </div>
                            <div class="d-grid mb-3">
                                <button type="submit" class="btn btn-primary btn-lg py-3 fw-bold">Login</button>
                            </div>
                            <div class="text-center">
                                <a href="#" class="text-decoration-none small text-muted">Forgot Password?</a>
                                <hr class="my-4">
                                <p class="mb-0">New to VidyaGuide? <a href="#" id="toggle-signup"
                                        class="text-primary text-decoration-none fw-bold">Sign Up</a></p>
                            </div>
                        </form>
                    </div>

                    <div id="signup-section" class="d-none">
                        <div class="text-center mb-4">
                            <h2 class="fw-bold text-primary">Create Account</h2>
                            <p class="text-muted">Join VidyaGuide AI and start planning your career.</p>
                        </div>
                        <form id="signup-form">
                            <div class="mb-3">
                                <label class="form-label fw-bold">Full Name</label>
                                <input type="text" class="form-control p-3 bg-light border-0 shadow-none"
                                    placeholder="John Doe" required>
                            </div>
                            <div class="mb-3">
                                <label class="form-label fw-bold">Email or Mobile</label>
                                <input type="text" class="form-control p-3 bg-light border-0 shadow-none"
                                    placeholder="Enter your email or mobile" required>
                            </div>
                            <div class="mb-3">
                                <label class="form-label fw-bold">Password</label>
                                <input type="password" class="form-control p-3 bg-light border-0 shadow-none"
                                    placeholder="••••••••" required>
                            </div>
                            <div class="d-grid mb-3">
                                <button type="submit" class="btn btn-primary btn-lg py-3 fw-bold">Sign Up</button>
                            </div>
                            <div class="text-center">
                                <p class="mb-0">Already have an account? <a href="#" id="toggle-login"
                                        class="text-primary text-decoration-none fw-bold">Log In</a></p>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Simple Toggle Logic
        const loginSection = document.getElementById('login-section');
        const signupSection = document.getElementById('signup-section');
        const toggleSignup = document.getElementById('toggle-signup');
        const toggleLogin = document.getElementById('toggle-login');

        toggleSignup.addEventListener('click', (e) => {
            e.preventDefault();
            loginSection.classList.add('d-none');
            signupSection.classList.remove('d-none');
        });

        toggleLogin.addEventListener('click', (e) => {
            e.preventDefault();
            signupSection.classList.add('d-none');
            loginSection.classList.remove('d-none');
        });

        // Simplified Auth Logic (Set isLoggedIn and redirect)
        const handleAuth = (e) => {
            e.preventDefault();
            localStorage.setItem('isLoggedIn', 'true');
            window.location.href = 'index.html';
        };

        document.getElementById('login-form').addEventListener('submit', handleAuth);
        document.getElementById('signup-form').addEventListener('submit', handleAuth);
    </script>
</body>

</html>
