<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Profile - VidyaGuide AI</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../css/style.css">
</head>

<body>
    <!-- Navigation Guard -->
    <script src="../js/guard.js"></script>

    <nav class="navbar navbar-expand-lg navbar-light sticky-top">
        <div class="container">
            <a class="navbar-brand fw-bold" href="../index.html">VidyaGuide AI</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link" href="../index.html">Home</a></li>
                    <li class="nav-item"><a class="nav-link active" href="profile.html">Profile</a></li>
                    <li class="nav-item"><a class="nav-link" href="dashboard.html">Dashboard</a></li>
                    <li class="nav-item"><a class="nav-link" href="resume-builder.html">Resume Builder</a></li>
                    <li class="nav-item"><a class="nav-link" href="career-guidance.html">Chatbot</a></li>
                    <li class="nav-item ms-lg-3">
                        <button class="btn btn-outline-danger btn-sm px-3" onclick="logout()">Logout</button>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container mt-5">
        <div class="row justify-content-center">
            <div class="col-md-8">
                <div class="card p-4 shadow-sm">
                    <h2 class="mb-4 text-primary fw-bold">Student Profile</h2>
                    <p class="text-muted mb-4">Tell us about yourself to help the AI mentor guide you better.</p>
                    <form id="profile-form">
                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label class="form-label fw-semibold">Full Name *</label>
                                <input type="text" class="form-control" id="profile-name" placeholder="John Doe"
                                    required>
                            </div>
                            <div class="col-md-6 mb-3">
                                <label class="form-label fw-semibold">Education Level *</label>
                                <select class="form-select" id="profile-edu-level" required>
                                    <option value="" selected disabled>Select Level</option>
                                    <option value="High School">High School</option>
                                    <option value="Undergraduate">Undergraduate</option>
                                    <option value="Postgraduate">Postgraduate</option>
                                    <option value="Professional">Professional</option>
                                </select>
                            </div>
                        </div>
                        <div class="mb-3">
                            <label class="form-label fw-semibold">Course / Branch *</label>
                            <input type="text" class="form-control" id="profile-course"
                                placeholder="e.g. Computer Science Engineering" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label fw-semibold">Skills (comma separated) *</label>
                            <input type="text" class="form-control" id="profile-skills"
                                placeholder="e.g. Python, SQL, Project Management" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label fw-semibold">Interests</label>
                            <textarea class="form-control" id="profile-interests" rows="2"
                                placeholder="What topics or areas excite you?"></textarea>
                        </div>
                        <div class="mb-4">
                            <label class="form-label fw-semibold">Career Goal *</label>
                            <textarea class="form-control" id="profile-goal" rows="2"
                                placeholder="Where do you see yourself in 3-5 years?" required></textarea>
                        </div>
                        <div class="d-grid">
                            <button type="submit" class="btn btn-primary btn-lg shadow-sm">Create Profile & Go to
                                Dashboard</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <script src="../js/storage.js"></script>
    <script src="../js/logout.js"></script>
    <script src="../js/app.js"></script>
    <script src="../js/profile.js"></script>
</body>

</html>
