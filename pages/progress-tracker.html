<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Progress Tracker - VidyaGuide AI</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../css/style.css">
</head>

<body>
    <!-- Navigation Guard -->
    <script src="../js/guard.js"></script>

    <nav class="navbar navbar-expand-lg navbar-light sticky-top">
        <div class="container">
            <a class="navbar-brand fw-bold" href="../index.html">VidyaGuide AI</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link" href="../index.html">Home</a></li>
                    <li class="nav-item"><a class="nav-link" href="profile.html">Profile</a></li>
                    <li class="nav-item"><a class="nav-link" href="dashboard.html">Dashboard</a></li>
                    <li class="nav-item"><a class="nav-link" href="resume-builder.html">Resume Builder</a></li>
                    <li class="nav-item"><a class="nav-link" href="career-guidance.html">Chatbot</a></li>
                    <li class="nav-item ms-lg-3">
                        <button class="btn btn-outline-danger btn-sm px-3" onclick="logout()">Logout</button>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container mt-5">
        <h1>Learning Dashboard</h1>
        <p class="text-muted">Track your courses and learning progress.</p>
        <div class="mb-4">
            <button class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#addCourseModal">Add New
                Course</button>
        </div>
        <div id="course-list" class="row">
            <!-- Courses will appear here -->
        </div>
    </div>

    <!-- Add Course Modal -->
    <div class="modal fade" id="addCourseModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">Add New Course</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <form id="add-course-form">
                        <div class="mb-3">
                            <label class="form-label">Course Name</label>
                            <input type="text" id="course-name" class="form-control" placeholder="e.g. Intro to Python"
                                required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Platform</label>
                            <input type="text" id="course-platform" class="form-control" placeholder="e.g. Coursera"
                                required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Progress (%)</label>
                            <input type="number" id="course-progress" class="form-control" min="0" max="100" value="0"
                                required>
                        </div>
                        <button type="submit" class="btn btn-primary w-100">Save Course</button>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../js/storage.js"></script>
    <script src="../js/logout.js"></script>
    <script src="../js/dashboard.js"></script>
</body>

</html>
