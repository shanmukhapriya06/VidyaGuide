<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Onboarding - VidyaGuide AI</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../css/style.css">
</head>

<body class="bg-light">
    <!-- Navigation Guard -->
    <script src="../js/guard.js"></script>

    <div class="container">
        <div class="row min-vh-100 align-items-center justify-content-center">
            <div class="col-md-6">
                <div class="card p-5 shadow-sm text-center border-0 rounded-4">
                    <h2 class="fw-bold text-primary mb-2">Personalize Your Journey</h2>
                    <p class="text-muted mb-4">Help us tailor VidyaGuide AI to your needs</p>

                    <form id="onboarding-form">
                        <div class="mb-4 text-start">
                            <label class="form-label fw-bold">Current Status</label>
                            <div class="row g-2">
                                <div class="col-4">
                                    <input type="radio" class="btn-check" name="status" id="status-school"
                                        value="School Student" required>
                                    <label class="btn btn-outline-primary w-100" for="status-school">School</label>
                                </div>
                                <div class="col-4">
                                    <input type="radio" class="btn-check" name="status" id="status-college"
                                        value="College Student">
                                    <label class="btn btn-outline-primary w-100" for="status-college">College</label>
                                </div>
                                <div class="col-4">
                                    <input type="radio" class="btn-check" name="status" id="status-graduate"
                                        value="Graduate">
                                    <label class="btn btn-outline-primary w-100" for="status-graduate">Graduate</label>
                                </div>
                            </div>
                        </div>

                        <div class="mb-4 text-start">
                            <label class="form-label fw-bold">Primary Goal</label>
                            <select class="form-select shadow-none p-3 bg-light border-0" id="onboarding-goal" required>
                                <option value="" selected disabled>Select your goal</option>
                                <option value="Build Resume">Build a professional resume</option>
                                <option value="Explore Careers">Explore career paths</option>
                                <option value="Prepare for Interviews">Prepare for interviews</option>
                            </select>
                        </div>

                        <div class="d-grid mt-5">
                            <button type="submit" class="btn btn-primary btn-lg py-3 fw-bold">Continue to
                                Dashboard</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <script src="../js/storage.js"></script>
    <script src="../js/onboarding.js"></script>
</body>

</html>
